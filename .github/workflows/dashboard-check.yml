name: ThaiCleftLink Dashboard Health Check

on:
  # Manual trigger (for testing)
  workflow_dispatch:
  # Auto run daily at 08:30 Bangkok time (01:30 UTC)
  schedule:
    - cron: '30 1 * * *'

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env file
        run: |
          cat > .env << EOF
          SITE_URL=${{ secrets.SITE_URL }}
          SITE_USERNAME=${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD=${{ secrets.SITE_PASSWORD }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EOF

      - name: Create reports directory
        run: mkdir -p reports/screenshots

      - name: Run dashboard health check
        run: npx tsx tests/run-check.ts

      - name: Generate HTML report
        run: npx tsx tests/generate-report.ts

      - name: Export PDF report
        run: npx tsx tests/export-pdf.ts

      - name: Send email report
        run: npx tsx tests/send-email.ts

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-report-${{ github.run_number }}
          path: |
            reports/*.html
            reports/*.pdf
          retention-days: 30
